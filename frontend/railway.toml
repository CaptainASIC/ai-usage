# Railway configuration — AI Credits Tracker Frontend Service
#
# Root directory in Railway: /frontend
# Railpack detects Node from package.json.
# Build: pnpm build (Vite → dist/public/ + esbuild server → dist/index.js)
# Start: node dist/index.js (Express serves dist/public/ as static root)
#
# Required environment variables:
#   VITE_API_URL = https://your-backend-service.railway.app

[build]
builder = "RAILPACK"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
