# Railway configuration — AI Credits Tracker (single service)
#
# Deploy from GitHub repo root — no root directory override needed.
# Railpack auto-detects Python from pyproject.toml at repo root.
# Build step compiles the React frontend first; uv installs Python deps.
# FastAPI serves the built frontend as static files at runtime.
#
# Required environment variables: see .env.example

[build]
builder = "RAILPACK"
buildCommand = "cd frontend && npm install -g pnpm --silent && pnpm install --frozen-lockfile && pnpm build && cd .."

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
