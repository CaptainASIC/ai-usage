# Railway configuration — AI Credits Tracker Backend Service
#
# Root directory in Railway: /backend
# Railpack detects Python from pyproject.toml.
# No frontend build step — frontend is a separate Railway service.
#
# Required environment variables: see .env.example

[build]
builder = "RAILPACK"

[deploy]
startCommand = "uv run uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
