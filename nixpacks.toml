[phases.setup]
nixPkgs = ["nodejs_22", "python311", "pnpm"]

[phases.install]
cmds = [
  "cd frontend && pnpm install --frozen-lockfile",
  "pip install uv",
  "cd backend && uv sync --frozen",
]

[phases.build]
cmds = [
  "cd frontend && pnpm build",
]

[start]
cmd = "cd backend && uv run uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
