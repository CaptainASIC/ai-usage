# Railway configuration — AI Credits Tracker (single service)
#
# Deploy from GitHub with root directory set to: /backend
# Railway will auto-detect railpack.json and use RAILPACK builder.
#
# Required environment variables (set in Railway Variables tab):
#   See .env.example at the repo root for the full list.
#
# The build step compiles the React frontend, then uv installs Python deps.
# FastAPI serves the built frontend as static files at runtime.

[build]
builder = "RAILPACK"
buildCommand = "cd ../frontend && npm install -g pnpm --silent && pnpm install --frozen-lockfile && pnpm build && cd ../backend"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
